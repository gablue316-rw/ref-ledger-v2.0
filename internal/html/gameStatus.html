<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ref Ledger V2.0 Update Game Status</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">    


    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

.navbar {
    background: #082b4f;
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    margin-right: 40px;
    white-space: nowrap;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-links a {
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    min-width: 90px;
    padding: 10px;

    border-radius: 6px;

    transition: .2s;
}

.nav-links a:hover {
    background: rgba(255,255,255,.10);
}

.nav-links a.active {
    background: rgba(255,255,255,.15);
}

.nav-links i {
    font-size: 22px;
    margin-bottom: 6px;
}

.nav-links span {
    font-size: 13px;
}

        .form-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-width: 220px;
        }

        .button-row {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-update {
            background-color: #16a34a;
        }

        .btn-update:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #dc2626;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        #result {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 50px;
        }

        @media (max-width: 768px) {
            .form-card {
                flex-direction: column;
            }

            input,
            select,
            .btn {
                width: 100%;
            }

            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Update Game Status</h1>
        <p>Enter Game IDs and update their status</p>
    </div>



<nav class="navbar">

    <div class="nav-links">

        <a href="/">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/dashboard">
            <i class="fa-solid fa-chart-column"></i>
            <span>Dashboard</span>
        </a>

        <a href="/reports">
            <i class="fa-solid fa-file-lines"></i>
            <span>Reports</span>
        </a>

        <a href="/games">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Games</span>
        </a>

        <a href="/officials">
            <i class="fa-solid fa-users"></i>
            <span>Officials</span>
        </a>

        <a href="/associations">
            <i class="fa-solid fa-building-columns"></i>
            <span>Associations</span>
        </a>

        <a href="/sites">
            <i class="fa-solid fa-location-dot"></i>
            <span>Sites</span>
        </a>

        <a href="/expenses">
            <i class="fa-solid fa-receipt"></i>
            <span>Expenses</span>
        </a>

        <a href="/payments">
            <i class="fa-solid fa-dollar-sign"></i>
            <span>Payments</span>
        </a>

        <a class="active" href="/gameStatus">
            <i class="fa-solid fa-rotate"></i>
            <span>Status</span>
        </a>

        <a href="/contact">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>     
             
    </div>

</nav>


    <form id="statusForm">

        <div class="form-card">

            <div class="form-group">
                <label for="gameIds">Game IDs</label>
                <input
                    type="text"
                    id="gameIds"
                    placeholder="1980-1982;2698-2700;2900"
                    required>
            </div>

            <div class="form-group">
                <label for="status">New Status</label>
                <select id="status" required>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                    <option value="Delete">Delete</option>
                </select>
            </div>

        </div>

        <div class="button-row">

            <button class="btn btn-update" type="submit">
                Update Games
            </button>

        </div>

    </form>

    <div id="result">Ready.</div>

</div>

<script>
document
    .getElementById("statusForm")
    .addEventListener("submit", async function (e) {

        e.preventDefault();

        const gameIds =
            document.getElementById("gameIds").value.trim();

        const status =
            document.getElementById("status").value;

        const result =
            document.getElementById("result");

        try {
            result.innerText = "Updating...";

            const response = await fetch("/api/games/status", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    gameIds: gameIds,
                    status: status
                })
            });
  
            const message = await response.text();

            document.getElementById("result").innerText =
            response.ok
                ? message || "Game status update completed."
                : message || "Error updating game status.";

        } catch (err) {
            result.innerText = "Request failed: " + err.message;
        }
    });
</script>

</body>
</html>
