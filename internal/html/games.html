<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ref Ledger V2.0 Game Entry</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:#f4f6f9;padding:20px;color:#333;}
.container{max-width:1200px;margin:auto;}
.header{background:#1e293b;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px;}
.header h1{margin-bottom:8px;}
.navbar{background:#0f172a;border-radius:10px;margin-bottom:20px;display:flex;flex-wrap:wrap;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.navbar a{color:#fff;text-decoration:none;padding:14px 20px;font-weight:bold;}
.navbar a:hover{background:#1e293b;}
.navbar a.active{background:#2563eb;}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.card-title{font-size:18px;font-weight:bold;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #ddd;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.form-group{display:flex;flex-direction:column;}
.form-group label{font-weight:bold;margin-bottom:5px;}
.form-group input,.form-group select{padding:10px;border:1px solid #ccc;border-radius:5px;}
.button-row{background:#fff;padding:15px 20px;border-radius:10px;margin-bottom:20px;display:flex;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.btn{border:none;color:white;padding:12px 20px;border-radius:5px;cursor:pointer;font-weight:bold;}
.btn-save{background:#16a34a;}
.btn-save:hover{background:#15803d;}
.btn-clear{background:#dc2626;}
.btn-clear:hover{background:#b91c1c;}
.btn-delete{background:#ffff00;color:black;}
.btn-delete:hover{background:#ffc000;color: black;}
.btn-get{
    background:#2563eb;
}

.btn-get:hover{
    background:#1d4ed8;
}
#message{margin-top:15px;font-weight:bold;}
@media(max-width:768px){
body{padding:10px;}
.navbar{flex-direction:column;}
.navbar a{text-align:center;}
.button-row{flex-direction:column;}
.btn{width:100%;}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Ref Ledger V2.0 Game Entry</h1>
<p>Create or update game information.</p>
</div>

<nav class="navbar">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/reports">Reports</a>
    <a href="/games" class="active">Games</a>
    <a href="/officials">Officials</a>
    <a href="/payments">Payments</a>
    <a href="/expenses">Expenses</a>
    <a href="/associations">Associations</a>
    <a href="/sites">Sites</a>
    <a href="/gameStatus">Update Game Status</a>
</nav>    

<form id="gameForm">

<div class="card">
<div class="card-title">Basic Game Information</div>
<div class="form-grid">
<div class="form-group">
<label for="association">Association</label>
<select id="association">
<option value="">Select Association</option>
<option value="GOLLC">GOLLC</option>
<option value="MCBOA">MCBOA</option>
<option value="MSO">MSO</option>
</select>
</div>
<div class="form-group"><label for="gameId">Game ID</label><input type="number" id="gameId" required></div>
<div class="form-group"><label for="date">Date</label><input type="date" id="date" required></div>
<div class="form-group"><label for="time">Time</label><input type="time" id="time" required></div>
</div>
</div>

<div class="card">
<div class="card-title">Location & Sport</div>
<div class="form-grid">
<div class="form-group">
    <label for="site">Site</label>
    <select id="site">
        <option value="">Select Site</option>
    </select>
</div>
<div class="form-group"><label for="field">Field</label><input type="text" id="field"></div>
<div class="form-group"><label for="sport">Sport</label><select id="sport"><option></option><option>Basketball</option><option>Softball</option></select></div>
<div class="form-group"><label for="level">Level</label><select id="level"><option></option><option>9th Grade</option><option>JV</option><option>Varsity</option><option>TB</option><option>PW</option><option>Minor</option><option>Major</option><option>Junior</option><option>Senior</option><option>SP</option><option>TRN30</option><option>TRN45</option><option>TRN50</option></select></div>
</div>
</div>

<div class="card">
<div class="card-title">Financial Information</div>
<div class="form-grid">
<div class="form-group"><label for="numOfGames">Number of Games</label><input type="number" id="numOfGames"></div>
<div class="form-group"><label for="gameFee">Game Fee</label><input type="number" step="0.01" id="gameFee"></div>
<div class="form-group"><label for="travelPay">Travel Pay</label><input type="number" step="0.01" id="travelPay"></div>
<div class="form-group"><label for="assignorFee">Assignor Fee</label><input type="number" step="0.01" id="assignorFee"></div>
<div class="form-group"><label for="deductions">Deductions</label><input type="number" step="0.01" id="deductions"></div>
</div>
</div>

<div class="card">
<div class="card-title">Officials</div>
<div class="form-grid">
<div class="form-group"><label for="status">Status</label><select id="status"><option></option><option>Cancelled</option><option>Completed</option><option>Delete</option><option>Paid</option><option>Pending</option></select></div>
<div class="form-group">
    <label for="referee">Referee</label>
    <select id="referee">
        <option value="">Select Official</option>
    </select>
</div>

<div class="form-group">
    <label for="u1">U1</label>
    <select id="u1">
        <option value="">Select Official</option>
    </select>
</div>

<div class="form-group">
    <label for="u2">U2</label>
    <select id="u2">
        <option value="">Select Official</option>
    </select>
</div>

<div class="form-group">
    <label for="eco">ECO</label>
    <select id="eco">
        <option value="">Select Official</option>
    </select>
</div>

<div class="form-group"><label for="assignor">Assignor</label><select id="assignor"><option></option><option>Euvonda Harrison</option><option>Scott Henry</option><option>Brian Hinson</option><option>Kevin Self</option><option>Barry Sullivan</option></select></div>
</div>
</div>

<div class="button-row">
    <button type="button" id="getGameBtn" class="btn btn-get">Get Game</button>
    <button type="submit" class="btn btn-save">Save Game</button>
    <button type="button" id="clearBtn" class="btn btn-clear">Clear Form</button>
    <button type="button" id="deleteBtn" class="btn btn-delete">Delete Game</button>
</div>

<div id="message"></div>
</form>
</div>

<script>

async function loadSites() {
    try {
        const response = await fetch("/api/loadSites");

        if (!response.ok) {
            throw new Error("Failed to load sites");
        }

        const sites = await response.json();
        console.log(sites);
    
        const dropdowns = [
            "site"
        ];

        dropdowns.forEach(id => {
            const select = document.getElementById(id);

            // Keep the first option
            select.innerHTML =
                '<option value="">Select Site</option>';

            sites.forEach(site => {
               const option = document.createElement("option");
               option.value = site.name;
               option.textContent = site.name;
               select.appendChild(option);
            });
        });

    } catch (err) {
        console.error("Error loading sites:", err);
    }
}


async function loadOfficials() {
    try {
        const response = await fetch("/api/loadOfficials");

        if (!response.ok) {
            throw new Error("Failed to load officials");
        }

        const officials = await response.json();
        console.log(officials);
    
        const dropdowns = [
            "referee",
            "u1",
            "u2",
            "eco"
        ];

        dropdowns.forEach(id => {
            const select = document.getElementById(id);

            // Keep the first option
            select.innerHTML =
                '<option value="">Select Official</option>';

            officials.forEach(official => {
               const option = document.createElement("option");
               option.value = official.name;
               option.textContent = official.name;
               select.appendChild(option);
            });
        });

    } catch (err) {
        console.error("Error loading officials:", err);
    }
}

document.addEventListener("DOMContentLoaded", function() {
    loadOfficials();
    loadSites();
});
document.getElementById("clearBtn").addEventListener("click", function () {
    document.getElementById("gameForm").reset();
    document.getElementById("message").innerText = "";
});


function toInputDate(dateStr) {
    const d = new Date(dateStr);
    return d.toISOString().split("T")[0];
}

function toInputTime(timeStr) {

    if (!timeStr) return "";

    const [time, modifier] = timeStr.split(" ");
    let [hours, minutes] = time.split(":");

    hours = parseInt(hours, 10);

    if (modifier === "PM" && hours !== 12) {
        hours += 12;
    }
    if (modifier === "AM" && hours === 12) {
        hours = 0;
    }

    return `${String(hours).padStart(2, "0")}:${minutes}`;
}


document.getElementById("deleteBtn").addEventListener("click", async function () {

    const gameId = document.getElementById("gameId").value;
    const association = document.getElementById("association").value;

    if (!gameId) {
        document.getElementById("message").innerText =
            "Enter a Game ID first.";
        return;
    }

    if (!association) {
        document.getElementById("message").innerText =
            "Enter an Association first.";
        return;
    }
    
    try {
        const response = await fetch(`/api/deleteGame/${association}/${gameId}`, {
            method: "DELETE"
        });

        const message = await response.text();

        document.getElementById("message").innerText =
            response.ok
                ? message || "Game deleted successfully."
                : message || "Error deleting game.";
    
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});

document.getElementById("getGameBtn").addEventListener("click", async function () {

    const gameId = document.getElementById("gameId").value;
    const association = document.getElementById("association").value;

    if (!gameId) {
        document.getElementById("message").innerText =
            "Enter a Game ID first.";
        return;
    }

    if (!association) {
        document.getElementById("message").innerText =
            "Enter an Association first.";
        return;
    }
    try {

        const response = await fetch(`/api/game/${association}/${gameId}`);

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Game not found.";
            return;
        }

        const game = await response.json();

        console.log("Returned game:", game);

        document.getElementById("association").value = game.Association;
        document.getElementById("gameId").value = game.GameId;
        document.getElementById("date").value = toInputDate(game.Date);
        document.getElementById("time").value = toInputTime(game.Time);
        document.getElementById("site").value = game.Site;
        document.getElementById("field").value = game.Field;
        document.getElementById("sport").value = game.Sport;
        document.getElementById("level").value = game.Level;

        document.getElementById("numOfGames").value = game.NumOfGames;
        document.getElementById("gameFee").value = game.GameFee;
        document.getElementById("travelPay").value = game.TravelPay;
        document.getElementById("assignorFee").value = game.AssignorFee;
        document.getElementById("deductions").value = game.Deductions;

        document.getElementById("status").value = game.Status;
        document.getElementById("referee").value = game.Referee;
        document.getElementById("u1").value = game.U1;
        document.getElementById("u2").value = game.U2;
        document.getElementById("eco").value = game.ECO; 
        document.getElementById("assignor").value = game.Assignor;

        document.getElementById("message").innerText =
            "Game loaded successfully.";

    } catch (err) {
        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});

document.getElementById("gameForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const game = {
        association: document.getElementById("association").value,
        gameId: parseInt(document.getElementById("gameId").value),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        site: document.getElementById("site").value,
        field: document.getElementById("field").value,
        sport: document.getElementById("sport").value,
        level: document.getElementById("level").value,
        numOfGames: parseInt(document.getElementById("numOfGames").value),
        gameFee: parseFloat(document.getElementById("gameFee").value),
        travelPay: parseFloat(document.getElementById("travelPay").value),
        assignorFee: parseFloat(document.getElementById("assignorFee").value),
        deductions: parseFloat(document.getElementById("deductions").value),
        status: document.getElementById("status").value,
        referee: document.getElementById("referee").value,
        u1: document.getElementById("u1").value,
        u2: document.getElementById("u2").value,
        eco: document.getElementById("eco").value,
        assignor: document.getElementById("assignor").value
    };

    try {
        const response = await fetch("/api/game-update", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(game)
        });

        document.getElementById("message").innerText =
            response.ok ? "Game saved successfully." : "Error saving game.";
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});
</script>
</body>
</html>
