<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Sites</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">    


    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

.navbar {
    background: #082b4f;
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    margin-right: 40px;
    white-space: nowrap;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-links a {
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    min-width: 90px;
    padding: 10px;

    border-radius: 6px;

    transition: .2s;
}

.nav-links a:hover {
    background: rgba(255,255,255,.10);
}

.nav-links a.active {
    background: rgba(255,255,255,.15);
}

.nav-links i {
    font-size: 22px;
    margin-bottom: 6px;
}

.nav-links span {
    font-size: 13px;
}


        .form-card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-update {
            background-color: #16a34a;
        }

        .btn-update:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #eab308; /* yellow */
            color: #000;              /* black text for contrast */
        }

        .btn-clear:hover {
            background-color: #ca8a04; /* darker yellow */
        }

        .btn-get{
            background:#2563eb;
        }

        .btn-get:hover{
            background:#1d4ed8;
        }        

        .btn-delete {
            background-color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        .btn-directory {
            background-color: #7c3aed;
            color: white;
        }

        .btn-directory:hover {
            background-color: #6d28d9;
            color: white;
        }

        .message-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 60px;
        }

        @media (max-width: 768px) {

            .row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        table {
           width: 100%;
           border-collapse: collapse;
        }

        th {
             background-color: #2563eb;
             color: white;
             padding: 10px;
             text-align: left;
        }

        td {
             padding: 10px;
             border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
             background-color: #f9fafb;
        }        


    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Sites</h1>
        <p>Manage your Sites (Schools and Parks)</p>
    </div>

 <nav class="navbar">

    <div class="nav-links">

        <a href="/">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/dashboard">
            <i class="fa-solid fa-chart-column"></i>
            <span>Dashboard</span>
        </a>

        <a href="/reports">
            <i class="fa-solid fa-file-lines"></i>
            <span>Reports</span>
        </a>

        <a href="/games">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Games</span>
        </a>

        <a href="/officials">
            <i class="fa-solid fa-users"></i>
            <span>Officials</span>
        </a>

        <a href="/associations">
            <i class="fa-solid fa-building-columns"></i>
            <span>Associations</span>
        </a>

        <a class="active" href="/sites">
            <i class="fa-solid fa-location-dot"></i>
            <span>Sites</span>
        </a>

        <a href="/expenses">
            <i class="fa-solid fa-receipt"></i>
            <span>Expenses</span>
        </a>

        <a href="/payments">
            <i class="fa-solid fa-dollar-sign"></i>
            <span>Payments</span>
        </a>

        <a href="/gameStatus">
            <i class="fa-solid fa-rotate"></i>
            <span>Status</span>
        </a>

    </div>

</nav>

    <div class="form-card">

        <form id="sitesForm">

            <div class="row">

                <div class="col">
                    <label for="siteId">Site ID</label>
                    <input
                        type="text" 
                        id="siteId" 
                        placeholder="Enter Site ID" required
                    >
                </div>

                <div class="col">
                    <label for="siteName">Site Name</label>
                    <input type="text" id="siteName" placeholder="Enter Site Name">
                </div>

                <div class="col">
                    <label for="contactName">Contact Name</label>
                    <input type="text" id="contactName" placeholder="Enter Contact Name">
                </div>

            </div>

            <div class="row">

                <div class="col">
                    <label for="contactNumber">Contact Number</label>
                    <input type="text" id="contactNumber" placeholder="Enter Contact Number">
                </div>
 
                <div class="col">
                    <label for="contactEmail">Contact Email</label>
                    <input type="email" id="contactEmail" placeholder="Enter Contact Email">
                </div>               

            </div>

            <div class="button-row">

                <button
                    type="button"
                    id="getSiteBtn"
                    class="btn btn-get">
                    Get Site
                </button>
                
                <button
                    type="submit"
                    class="btn btn-update">
                    Update Site
                </button>

                <button
                    type="button"
                    id="clearSiteBtn"
                    class="btn btn-clear">
                    Clear Site
                </button>                
                
                <button
                   type="button"
                   id="deleteBtn"
                   class="btn btn-delete">
                   Delete Site
                </button>

                <button
                    type="button"
                    id="directoryBtn"
                    class="btn btn-directory">
                    Site Directory
                </button>                       

            </div>

        </form>

    </div>

    <div class="message-box" id="message">
        Ready to enter Sites
    </div>


   <div class="form-card" id="directorySection" style="display:none;">

       <h2>Sites Directory</h2>

       <table id="sitesTable" style="width:100%; border-collapse:collapse;">

           <thead>
               <tr>
                   <th>Site ID</th>
                   <th>Site Name</th>
                   <th>Contact Name</th>
                   <th>Contact Number</th>
                   <th>Contact Email</th>
               </tr>
           </thead>
  
           <tbody>
           </tbody>

       </table>

    </div>    
</div>

<script>


document.getElementById("clearSiteBtn").addEventListener("click", function () {
    document.getElementById("sitesForm").reset();
    document.getElementById("message").innerText = "";
});


document.getElementById("getSiteBtn").addEventListener("click", async function () {

    const siteId = document.getElementById("siteId").value;
    
    if (!siteId) {
        document.getElementById("message").innerText =
            "Enter a Site ID first.";
        return;
    }

    try {

        const response = await fetch(`/api/site/${siteId}`);

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Site not found.";
            return;
        }

        const site = await response.json();

        console.log("Returned site:", site);

        document.getElementById("siteId").value = site.Id || "";
        document.getElementById("siteName").value = site.Name || "";
        document.getElementById("contactName").value = site.Contact || "";
        document.getElementById("contactNumber").value = site.Phone || "";
        document.getElementById("contactEmail").value = site.Email || "";
 
        document.getElementById("message").innerText =
            "Site loaded successfully.";

    } catch (err) {
        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});


document.getElementById("deleteBtn").addEventListener("click", async () => {

    const siteId = document.getElementById("siteId").value;

    try {
        const response = await fetch(`/api/deleteSite/${siteId}`, {
            method: "DELETE"
        });

        const message = await response.text();

        document.getElementById("message").innerText =
            response.ok
                ? message || "Site deleted successfully."
                : message || "Error deleting site.";
    
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});

document.getElementById("sitesForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const site = {
       id: document.getElementById("siteId").value,
       name: document.getElementById("siteName").value,
       contact: document.getElementById("contactName").value,
       phone: document.getElementById("contactNumber").value,
       email: document.getElementById("contactEmail").value,
    };

    try {
        const response = await fetch("/api/sites", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(site)
        });

        document.getElementById("message").innerText =
            response.ok ? "Site saved successfully." : "Error saving site.";
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});

document.getElementById("directoryBtn")
.addEventListener("click", async function () {

    try {

        const response = await fetch("/api/sitesDirectory");

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Unable to load directory.";
            return;
        }

        const sites = await response.json();

        const tbody =
            document.querySelector("#sitesTable tbody");

        tbody.innerHTML = "";

        sites.forEach(site => {

            const row = document.createElement("tr");

                
            row.innerHTML = `
                <td>${site.Id}</td>
                <td>${site.Name}</td>
                <td>${site.Contact}</td>
                <td>${site.Phone}</td>
                <td>${site.Email}</td>
            `;

            tbody.appendChild(row);
        });

        document.getElementById("directorySection").style.display = "block";

        document.getElementById("message").innerText =
            `${sites.length} sites loaded.`;

    } catch (err) {

        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});

</script>

</body>
</html>
