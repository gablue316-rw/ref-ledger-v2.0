<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ref-Ledger - Reset Password</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    width: 320px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1d4ed8;
}

.message {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.success {
    color: green;
}

.error {
    color: red;
}

</style>

</head>

<body>

<div class="container">

    <h2>Reset Password</h2>

    <input
        type="password"
        id="password"
        placeholder="New Password"
        required>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required>

    <button onclick="resetPassword()">
        Reset Password
    </button>

    <div id="message" class="message"></div>

</div>

<script>

const token = new URLSearchParams(
    window.location.search
).get("token");


async function resetPassword() {

    const password =
        document.getElementById("password").value;

    const confirm =
        document.getElementById("confirmPassword").value;

    const message =
        document.getElementById("message");


    message.innerText = "";
    message.className = "message";


    if (!token) {

        message.classList.add("error");

        message.innerText =
            "Invalid reset link.";

        return;
    }


    if (!password || !confirm) {

        message.classList.add("error");

        message.innerText =
            "Both fields are required.";

        return;
    }


    if (password !== confirm) {

        message.classList.add("error");

        message.innerText =
            "Passwords do not match.";

        return;
    }


    try {

        const response = await fetch(
            "/api/resetPassword",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify({

                    token: token,

                    password: password
                })
            }
        );


        const result =
            await response.json();


        if (response.ok) {

            message.classList.add("success");

            message.innerText =
                "Password reset successful.";

            setTimeout(() => {

                window.location.href =
                    "/login";

            }, 2000);

        }
        else {

            message.classList.add("error");

            message.innerText =
                result.message ||
                "Unable to reset password.";
        }

    }
    catch (err) {

        message.classList.add("error");

        message.innerText =
            "Unable to contact server.";
    }

}

</script>

</body>
</html>
