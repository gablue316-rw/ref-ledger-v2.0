<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Expense Entry</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">    

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

.navbar {
    background: #082b4f;
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    margin-right: 40px;
    white-space: nowrap;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-links a {
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    min-width: 90px;
    padding: 10px;

    border-radius: 6px;

    transition: .2s;
}

.nav-links a:hover {
    background: rgba(255,255,255,.10);
}

.nav-links a.active {
    background: rgba(255,255,255,.15);
}

.nav-links i {
    font-size: 22px;
    margin-bottom: 6px;
}

.nav-links span {
    font-size: 13px;
}


        .form-card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-save {
            background-color: #16a34a;
        }

        .btn-save:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #dc2626;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .message-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 60px;
        }

        @media (max-width: 768px) {

            .row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Expense Entry</h1>
        <p>Record and track your officiating expenses.</p>
    </div>

<nav class="navbar">

    <div class="nav-links">

        <a href="/">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        
        <a href="/dashboard">
            <i class="fa-solid fa-chart-column"></i>
            <span>Dashboard</span>
        </a>

        <a href="/reports">
            <i class="fa-solid fa-file-lines"></i>
            <span>Reports</span>
        </a>

        <a href="/games">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Games</span>
        </a>

        <a href="/officials">
            <i class="fa-solid fa-users"></i>
            <span>Officials</span>
        </a>

        <a href="/associations">
            <i class="fa-solid fa-building-columns"></i>
            <span>Associations</span>
        </a>

        <a href="/sites">
            <i class="fa-solid fa-location-dot"></i>
            <span>Sites</span>
        </a>

        <a class="active" href="/expenses">
            <i class="fa-solid fa-receipt"></i>
            <span>Expenses</span>
        </a>

        <a href="/payments">
            <i class="fa-solid fa-dollar-sign"></i>
            <span>Payments</span>
        </a>

        <a href="/gameStatus">
            <i class="fa-solid fa-rotate"></i>
            <span>Status</span>
        </a>

        <a href="/contact">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>  

        <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </a>        

    </div>

</nav>

    <div class="form-card">

        <form id="expenseForm">

            <div class="row">

                <div class="col">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="col">
                    <label for="association">Association</label>
                    <select id="association">
                        <option value="">Select Association</option>
                        <option value="GOLLC">GOLLC</option>
                        <option value="MCBOA">MCBOA</option>
                        <option value="MSO">MSO</option>
                    </select>
                </div>

            </div>

            <div class="form-group">
                <label for="expenseType">Expense Type</label>
                <select id="expenseType" required>
                    <option value="">Select Expense Type</option>
                    <option value="Mileage">Mileage</option>
                    <option value="Food">Food</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Camp Fees">Camp Fees</option>
                    <option value="Association Dues">Association Dues</option>
                </select>
            </div>

            <div class="row">

                <div class="col">
                    <label for="amount">Amount / Miles</label>
                    <input
                        type="number"
                        id="amount"
                        step="0.01"
                        required
                    >
                </div>

                <div class="col">
                    <label for="gameId">Game ID</label>
                    <input
                        type="number"
                        id="gameId"
                    >
                </div>

            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea
                    id="description"
                    rows="4">
                </textarea>
            </div>

            <div class="button-row">

                <button
                    type="submit"
                    class="btn btn-save">
                    Save Expense
                </button>

                <button
                    type="reset"
                    class="btn btn-clear">
                    Clear Form
                </button>

            </div>

        </form>

    </div>

    <div class="message-box" id="message">
        Ready to enter expenses.
    </div>

</div>

<script>

document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
        const response = await fetch("/api/logout", {
            method: "POST"
        });

        if (response.ok || response.redirected) {
            window.location.href = "/login";
        } else {
            alert("Logout failed");
        }
    } catch(err) {
        alert("Logout failed");
    }
});

document.getElementById("expenseForm")
.addEventListener("submit", async function(e) {

    e.preventDefault();

    const messageBox = document.getElementById("message");

    const expense = {
        date: document.getElementById("date").value,
        expenseType: document.getElementById("expenseType").value,
        amount: parseFloat(document.getElementById("amount").value),
        description: document.getElementById("description").value.trim(),
        association: document.getElementById("association").value,
        gameId: parseInt(document.getElementById("gameId").value) || 0
    };

    try {
        const response = await fetch("/api/expenses", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(expense)
        });

        if (response.status === 401 || response.redirected) {
            window.location.href = "/login";
            return;
        }

        if (response.status === 403) {
            messageBox.innerText =
                "Permission denied. Read-only users cannot enter expenses.";
            return;
        }

        const message = await response.text();

        messageBox.innerText =
            response.ok
                ? message || "Expense saved successfully."
                : message || "Error saving expense.";

        if (response.ok) {
            document.getElementById("expenseForm").reset();
        }

    } catch (err) {
        messageBox.innerText = "Server unavailable.";
    }
});

</script>

</body>
</html>
