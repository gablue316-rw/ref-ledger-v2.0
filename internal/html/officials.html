<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Officials Entry</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .navbar {
            background-color: #0f172a;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: #1e293b;
        }

        .navbar a.active {
            background-color: #2563eb;
        }

        .form-card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-delete{
            background:#ffff00;color:black;
        }
        
        .btn-delete:hover{
            background:#ffc000;color: black;
        }

        .btn-get{
            background:#2563eb;
        }

        .btn-get:hover{
            background:#1d4ed8;
        }

        .btn-save {
            background-color: #16a34a;
        }

        .btn-save:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #dc2626;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .btn-directory {
            background-color: #7c3aed;
            color: white;
        }

        .btn-directory:hover {
            background-color: #6d28d9;
            color: white;
        }
        
        .message-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 60px;
        }

        @media (max-width: 768px) {

            .row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        table {
           width: 100%;
           border-collapse: collapse;
        }

        th {
             background-color: #2563eb;
             color: white;
             padding: 10px;
             text-align: left;
        }

        td {
             padding: 10px;
             border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
             background-color: #f9fafb;
        }        

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Officials Entry</h1>
        <p>Manage and track Officials information.</p>
    </div>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/games">Games</a>
        <a href="/officials" class="active">Officials</a>
        <a href="/payments">Payments</a>
        <a href="/expenses">Expenses</a>
        <a href="/associations">Associations</a>
        <a href="/sites">Sites</a>
    </nav>

    <div class="form-card">

        <form id="officialsForm">

            <div class="row">

                <div class="form-group">
                   <label for="firstname">First Name</label>
                   <input
                       type="text"
                       id="firstname"
                       required
                   >
                </div>

                <div class="form-group">
                   <label for="lastname">Last Name</label>
                   <input
                       type="text"
                       id="lastname"
                       required
                   >
                </div>

                <div class="form-group">
                   <label for="phone">Phone</label>
                   <input
                       type="text"
                       id="phone"
                       required
                   >
                </div>                

            </div>

            <div class="row">

                <div class="col">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                    >
                </div>

                <div class="col">
                    <label for="address">Address</label>
                    <input
                        type="text"
                        id="address"
                    >
                </div>    

            </div>

</div>

            <div class="button-row">

                <button 
                    type="button"
                    id="getOfficialBtn"
                    class="btn btn-get">
                    Get Official
                </button>    

                <button
                    type="submit"
                    class="btn btn-save">
                    Save Official
                </button>
                              
                <button
                    type="clear"
                    id="clearBtn"
                    class="btn btn-clear">
                    Clear Form
                </button>

                <button
                    type="button"
                    id="deleteOfficialBtn"
                    class="btn btn-delete">
                    Delete Official
                </button>

                <button
                    type="button"
                    id="directoryBtn"
                    class="btn btn-directory">
                    Official Directory
                </button>                

            </div>

        </form>

    </div>

    <div class="message-box" id="message">
        Ready to enter officials.
    </div>

    <div class="form-card" id="directorySection" style="display:none;">

       <h2>Officials Directory</h2>

       <table id="officialsTable" style="width:100%; border-collapse:collapse;">

           <thead>
               <tr>
                   <th>First Name</th>
                   <th>Last Name</th>
                   <th>Phone</th>
                   <th>Email</th>
               </tr>
           </thead>
  
           <tbody>
           </tbody>

       </table>

    </div>

</div>

<script>

document.getElementById("clearBtn").addEventListener("click", function () {
    document.getElementById("officialsForm").reset();
    document.getElementById("message").innerText = "";
});

document.getElementById("officialsForm")
.addEventListener("submit", async function(e) {

    e.preventDefault();

    const official = {
        firstName: document.getElementById("firstname").value,
        lastName: document.getElementById("lastname").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };


    try {

        const response = await fetch("/api/officials", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(official)
        });

        if (response.ok) {

            document.getElementById("message").innerText =
                "Official saved successfully.";

            document.getElementById("officialsForm").reset();

        } else {

            document.getElementById("message").innerText =
                "Error saving official.";
        }

    } catch (err) {

        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});

document.getElementById("getOfficialBtn").addEventListener("click", async function () {

    const firstName = document.getElementById("firstname").value;
    const lastName = document.getElementById("lastname").value;

    if (!firstName || !lastName) {
        document.getElementById("message").innerText =
            "Enter both First Name and Last Name first.";
        return;
    }

    try {

        const response = await fetch(`/api/officials/${firstName}/${lastName}`);

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Official not found.";
            return;
        }

        const official = await response.json();

        console.log("Returned official:", official);

        document.getElementById("firstname").value = official.FirstName;
        document.getElementById("lastname").value = official.LastName;
        document.getElementById("phone").value = official.Phone;
        document.getElementById("email").value = official.Email;    
        document.getElementById("address").value = official.Address;

        document.getElementById("message").innerText =
            "Official loaded successfully.";

    } catch (err) {
        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});

document.getElementById("deleteOfficialBtn").addEventListener("click", async function () {

    const firstName = document.getElementById("firstname").value;
    const lastName = document.getElementById("lastname").value;

    if (!firstName || !lastName) {
        document.getElementById("message").innerText =
            "Enter both First Name and Last Name first.";
        return;
    }

        
    try {
        const response = await fetch(`/api/deleteOfficial/${firstName}/${lastName}`, {
            method: "DELETE"
        });

        const message = await response.text();

        document.getElementById("message").innerText =
            response.ok
                ? message || "Official deleted successfully."
                : message || "Error deleting official.";
    
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});

document.getElementById("directoryBtn")
.addEventListener("click", async function () {

    try {

        const response = await fetch("/api/officialsDirectory");

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Unable to load directory.";
            return;
        }

        const officials = await response.json();

        const tbody =
            document.querySelector("#officialsTable tbody");

        tbody.innerHTML = "";

        officials.forEach(official => {

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${official.FirstName}</td>
                <td>${official.LastName}</td>
                <td>${official.Phone}</td>
                <td>${official.Email}</td>
            `;

            tbody.appendChild(row);
        });

        document.getElementById("directorySection").style.display = "block";

        document.getElementById("message").innerText =
            `${officials.length} officials loaded.`;

    } catch (err) {

        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});
</script>

</body>
</html>
