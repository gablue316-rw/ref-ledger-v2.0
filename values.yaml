# Number of Ref Ledger pods
replicaCount: 1

image:
  repository: gablue316/ref-ledger
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

container:
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  TZ: America/New_York

cloudflare:
  enabled: true
  replicas: 1
  image:
    repository: cloudflare/cloudflared
    tag: latest
    pullPolicy: IfNotPresent

  tunnelId: 00629144-3807-4593-ac77-24698d2d12cd
  hostname: ref-ledger.com
  credentialsSecret: cloudflared-creds

mongodb:
  host: mongodb
  port: 27017
  database: refLedger_v2

logging:
  level: info

probes:
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20

  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}

tolerations: []

affinity: {}