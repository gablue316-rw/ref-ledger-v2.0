{{- if .Values.cloudflare.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared

spec:
  replicas: {{ .Values.cloudflare.replicas }}

  selector:
    matchLabels:
      app: cloudflared

  template:
    metadata:
      labels:
        app: cloudflared

    spec:
      containers:
        - name: cloudflared
          image: "{{ .Values.cloudflare.image.repository }}:{{ .Values.cloudflare.image.tag }}"
          imagePullPolicy: {{ .Values.cloudflare.image.pullPolicy }}

          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run

          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared

            - name: creds
              mountPath: /creds

      volumes:
        - name: config
          configMap:
            name: cloudflared-config

        - name: creds
          secret:
            secretName: {{ .Values.cloudflare.credentialsSecret }}
{{- end }}