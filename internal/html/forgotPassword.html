<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ref-Ledger - Forgot Password</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    width:350px;
}

h2{
    text-align:center;
    color:#1f4e79;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#1f4e79;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#16395b;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#1f4e79;
}

.back a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <h2>Forgot Password</h2>

    <p>
        Enter your email address and we'll send a password reset link.
    </p>

    <div class="form-group">
        <label for="email">Email Address</label>

        <input
            type="email"
            id="email"
            placeholder="name@example.com"
            required>
    </div>


    <button onclick="sendResetLink()">
        Send Reset Link
    </button>


    <div id="message"></div>


    <div class="back">
        <a href="/login">
            Back to Login
        </a>
    </div>

</div>


<script>

async function sendResetLink() {

    const email =
        document.getElementById("email").value.trim();

    const message =
        document.getElementById("message");


    if(email === ""){

        message.className = "error";

        message.innerText =
            "Please enter an email address.";

        return;
    }


    try{

        const response =
            await fetch("/api/forgotPassword",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email
                })

            });


        if(response.ok){

            message.className = "success";

            message.innerText =
            "If an account exists, a password reset email has been sent.";

        }
        else{

            message.className = "error";

            message.innerText =
                "Unable to process request.";
        }

    }
    catch(err){

        message.className = "error";

        message.innerText =
            "Unable to contact server.";
    }

}

</script>

</body>
</html>
