<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ref Ledger V2.0 - Contact</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

  * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

.navbar {
    background: #082b4f;
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-links a {
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    min-width: 90px;
    padding: 10px;

    border-radius: 6px;

    transition: .2s;
}

.nav-links a:hover {
    background: rgba(255,255,255,.10);
}

.nav-links a.active {
    background: rgba(255,255,255,.15);
}

.nav-links i {
    font-size: 22px;
    margin-bottom: 6px;
}

.nav-links span {
    font-size: 13px;
}

.container{
    max-width:800px;
    margin:50px auto;
    padding:30px;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#082b4f;
    margin-bottom:20px;
}

p{
    margin-bottom:15px;
    line-height:1.6;
}

.email{
    font-size:20px;
    font-weight:bold;
}

.email a{
    color:#2563eb;
    text-decoration:none;
}

.email a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<nav class="navbar">

    <div class="nav-links">

        <a href="/">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/dashboard">
            <i class="fa-solid fa-chart-column"></i>
            <span>Dashboard</span>
        </a>

        <a href="/reports">
            <i class="fa-solid fa-file-lines"></i>
            <span>Reports</span>
        </a>

        <a href="/games">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Games</span>
        </a>

        <a href="/officials">
            <i class="fa-solid fa-users"></i>
            <span>Officials</span>
        </a>

        <a href="/associations">
            <i class="fa-solid fa-building-columns"></i>
            <span>Associations</span>
        </a>

        <a href="/sites">
            <i class="fa-solid fa-location-dot"></i>
            <span>Sites</span>
        </a>

        <a href="/expenses">
            <i class="fa-solid fa-receipt"></i>
            <span>Expenses</span>
        </a>

        <a href="/payments">
            <i class="fa-solid fa-dollar-sign"></i>
            <span>Payments</span>
        </a>

        <a href="/gameStatus">
            <i class="fa-solid fa-rotate"></i>
            <span>Status</span>
        </a>


        <a class="active" href="contact.html">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>

        <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </a>        


    </div>

</nav>


<div class="container">

    <div class="card">

        <h1>Contact Ref Ledger</h1>

        <p>
            Thank you for your interest in Ref Ledger.
        </p>

        <p>
            Questions, feedback, feature requests, and support inquiries are welcome.
        </p>

        <p class="email">
            📧 <a href="mailto:refledger316@gmail.com">
                refledger316@gmail.com
            </a>
        </p>

    </div>

</div>

<script>

document.getElementById("logoutBtn").addEventListener("click", async () => {

    try {

        const response = await fetch("/api/logout", {
            method: "POST"
        });

        if (response.ok) {
            window.location.href = "/login";
        } else {
            alert("Logout failed");
        }

    } catch(err) {
        alert("Logout failed");
    }

});        

</script>
</body>
</html>
