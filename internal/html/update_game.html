<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ref Ledger V2.0 Game Entry</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px; 
        }

        .col {
            flex: 1;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }

    .save-btn {
        background-color: #28a745; /* green */
        color: white;
        border: none;
        border-radius: 4px;
    }

    .save-btn:hover {
        background-color: #218838;
    }

    .clear-btn {
        background-color: #dc3545; /* red */
        color: white;
        border: none;
        border-radius: 4px;
    }

    .clear-btn:hover {
        background-color: #c82333; 
    }
    </style>
</head>
<body>

<h1>Ref-Ledger V2.0 Game Entry</h1>

<form id="gameForm">

    <div class="row">
        <div class="form-group">
            <label for="association">Association</label>
            <select id="association">
                <option value="">Select Association</option>
                <option value="GOLLC">GOLLC</option>
                <option value="MCBOA">MCBOA</option>
                <option value="MSO">MSO</option>
            </select>
        </div>      

        <div class="col">
            <label for="gameId">Game ID</label>
            <input type="number" id="gameId" required>
        </div>
        
        <div class="col">
            <label for="date">Date</label>
            <input type="date" id="date" required>
        </div>
        
        <div class="col">
            <label for="time">Time</label>
            <input type="time" id="time" required>
        </div>
   </div> 

   <div class="row">       
        <div class="form-group">
            <label for="site">Site</label>
            <select id="site">
                <option value="">Select Site</option>
                <option value="BETHSDA">Bethesda Park</option>                
                <option value="BOGNP">Bogan Park</option>
                <option value="BFORD">Buford Park</option>
                <option value="BRKWHS">Brookwood High School</option>                
                <option value="CGWHS">Central Gwinnett High School</option>
                <option value="COLLHS">Collins Hill High School</option>
                <option value="COLLINSHILL">Collins Hill Park</option>                
                <option value="DACHS">Dacula High School</option>
                <option value="DISCHS">Discovery High School</option>
                <option value="DULHS">Duluth High School</option>
                <option value="FCENHS">Forsyth Central High School</option>                
                <option value="GP">George Pierce</option>                
                <option value="HBRHS">Hebron High School</option>
                <option value="LAMHS">Lambert High School</option>
                <option value="LANHS">Lanier High School</option>                
                <option value="MLCHS">Mill Creek High School</option>
                <option value="MNRAHS">Monroe Area High School</option>                
                <option value="NFORHS">North Forsyth High School</option>                
                <option value="NGWHS">North Gwinnett High School</option>
                <option value="SHIHS">Shiloh High School</option>
                <option value="SFORHS">South Forsyth High School</option>
                <option value="SGWHS">South Gwinnett High School</option>     
                <option value="WBARHS">Winder Barrow High School</option>
            </select>

        </div>
    
        <div class="col">
            <label for="field">Field</label>
            <input type="text" id="field" required>
        </div>
        
        <div class="form-group">
            <label for="sport">Sport</label>
            <select id="sport">
                <option value="">Select Sport</option>
                <option value="Basketball">Basketball</option>
                <option value="Softball">Softball</option>
            </select>
        </div>

        <div class="form-group">
            <label for="level">Level</label>
            <select id="level">
                <option value="">Select Level</option>
                <option value="9th Grade">9th Grade</option>
                <option value="JV">JV</option>
                <option value="Varsity">Varsity</option>
                <option value="TB">TB</option>
                <option value="PW">PW</option>
                <option value="Minor">Minor</option>
                <option value="Major">Major</option>
                <option value="Junior">Junior</option>
                <option value="Senior">Senior</option>
                <option value="SP">SP</option>
            </select>
        </div>

    </div>


    <div class="row">        
        <div class="col">
            <label for="numOfGames">Number of Games</label>
            <input type="number" id="numOfGames" required>
        </div>
      
        <div class="col">
            <label for="gameFee">Game Fee</label>
            <input type="number" id="gameFee" step="0.01" required>
        </div>

        <div class="col">
            <label for="travelPay">Travel Pay</label>
            <input type="number" id="travelPay" step="0.01">
        </div>

        <div class="col">
            <label for="assignorFee">Assignor Fee</label>
            <input type="number" id="assignorFee" step="0.01">
        </div>   

        <div class="col">
            <label for="deductions">Deductions</label>
            <input type="number" id="deductions" step="0.01">
        </div>                 

    </div>

    <div class="row">     
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
                <option value="">Select Status</option>
                <option value="Cancelled">Cancelled</option>
                <option value="Completed">Completed</option>
                <option value="Delete">Delete</option>
                <option value="Paid">Paid</option>  
                <option value="Pending">Pending</option>              
            </select>
        </div>  

        <div class="col">
            <label for="referee">Referee</label>
            <input type="text" id="referee" placeholder="Unassigned">
        </div>

        <div class="col">
            <label for="u1">U1</label>
            <input type="text" id="u1" placeholder="Unassigned">
        </div>

        <div class="col">
            <label for="u2">U2</label>
            <input type="text" id="u2" placeholder="Unassigned">
        </div>

        <div class="col">
            <label for="eco">ECO</label>
            <input type="text" id="eco" placeholder="Unassigned">
        </div>    

        <div class="form-group">
            <label for="assignor">Assignor</label>
            <select id="assignor">
                <option value="">Select Assignor</option>
                <option value="Euvonda Harrison">Euvonda Harrison</option>
                <option value="Scott Henry">Scott Henry</option>
                <option value="Brian Hinson">Brian Hinson</option>
                <option value="Kevin Self">Kevin Self</option>
                <option value="Barry Sullivan">Barry Sullivan</option>
            </select>
        </div>           

    </div>    
    
    <button type="submit" class="save-btn">Save Game</button>
    <button type="button" id="clearBtn" class="clear-btn">Clear Form</button>
   
</form>

<div id="message"></div>

<script>
document.getElementById("clearBtn").addEventListener("click", function () {
    document.getElementById("gameForm").reset();
    document.getElementById("message").innerText = "";
});    

document.getElementById("gameForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const game = {
        association: document.getElementById("association").value,
        gameId: parseInt(document.getElementById("gameId").value),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        site: document.getElementById("site").value,
        field: document.getElementById("field").value,
        sport: document.getElementById("sport").value,
        level: document.getElementById("level").value,              
        numOfGames: parseInt(document.getElementById("numOfGames").value),
        gameFee: parseFloat(document.getElementById("gameFee").value),
        travelPay: parseFloat(document.getElementById("travelPay").value),
        assignorFee: parseFloat(document.getElementById("assignorFee").value),
        deductions: parseFloat(document.getElementById("deductions").value),
        status: document.getElementById("status").value,    
        referee: document.getElementById("referee").value,
        u1: document.getElementById("u1").value,      
        u2: document.getElementById("u2").value,      
        eco: document.getElementById("eco").value,       
        assignor: document.getElementById("assignor").value,
    };

    try {
        const response = await fetch("/api/game-update", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(game)
        });

        if (response.ok) {
            document.getElementById("message").innerText =
                "Game saved successfully.";
  
        } else {
            document.getElementById("message").innerText =
                "Error saving game.";
        }
    } catch (err) {
        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});
 
</script>

</body>
</html>
