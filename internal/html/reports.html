<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Reports</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">    

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }


.navbar {
    background: #082b4f;
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    margin-right: 40px;
    white-space: nowrap;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-links a {
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    min-width: 90px;
    padding: 10px;

    border-radius: 6px;

    transition: .2s;
}

.nav-links a:hover {
    background: rgba(255,255,255,.10);
}

.nav-links a.active {
    background: rgba(255,255,255,.15);
}

.nav-links i {
    font-size: 22px;
    margin-bottom: 6px;
}

.nav-links span {
    font-size: 13px;
}

        .filters {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .email {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-width: 220px;
        }

        .email-row {
            display:flex;
            gap: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-width: 220px;
        }

        .field {
            display: flex;
            flex-direction: column; /* puts label above input */
        }

        .field input {
            width: 200px;
            padding: 8px;
        }
        
        .button-row {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-create {
            background-color: #16a34a;
        }

        .btn-create:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #dc2626;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .report-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .report-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        #reportContainer {
            min-height: 300px;
            white-space: pre-wrap;
            font-family: Consolas, Monaco, monospace;
            font-size: 14px;
            line-height: 1.4;
            padding: 10px;
            background-color: #fafafa;
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow-x: auto;
        }

        @media (max-width: 768px) {

            .filters {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .filter-group input,
            .filter-group select,
            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Reports</h1>
        <p>Select and Generate Your Report. Not all filters apply to all reports.</p>
    </div>

 <nav class="navbar">

    <div class="nav-links">

        <a href="/">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>

        <a href="/dashboard">
            <i class="fa-solid fa-chart-column"></i>
            <span>Dashboard</span>
        </a>

        <a class="active" href="/reports">
            <i class="fa-solid fa-file-lines"></i>
            <span>Reports</span>
        </a>

        <a href="/games">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Games</span>
        </a>

        <a href="/officials">
            <i class="fa-solid fa-users"></i>
            <span>Officials</span>
        </a>

        <a href="/associations">
            <i class="fa-solid fa-building-columns"></i>
            <span>Associations</span>
        </a>

        <a href="/sites">
            <i class="fa-solid fa-location-dot"></i>
            <span>Sites</span>
        </a>

        <a href="/expenses">
            <i class="fa-solid fa-receipt"></i>
            <span>Expenses</span>
        </a>

        <a href="/payments">
            <i class="fa-solid fa-dollar-sign"></i>
            <span>Payments</span>
        </a>

        <a href="/gameStatus">
            <i class="fa-solid fa-rotate"></i>
            <span>Status</span>
        </a>

        <a href="/contact">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>        

        <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </a>
            
    </div>

</nav>


    <!-- FILTERS ROW -->
    <div class="filters">

        <div class="filter-group">
            <label for="type">Report Type</label>
            <select id="type">
                <option value=""></option>
                <option value="Accounts Receivable">Accounts Receivable</option>
                <option value="Expenses">Expenses</option>
                <option value="Games">Games</option>
                <option value="Income">Income</option>
                <option value="Payments">Payments</option>
                <option value="Reconciliation">Reconciliation</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="association">Association</label>
            <select id="association">
                <option value="">All</option>
                <option value="GOLLC">GOLLC</option>
                <option value="MCBOA">MCBOA</option>
                <option value="MSO">MSO</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="status">Status</label>
            <select id="status">
                <option value="">All</option>
                <option value="Cancelled">Cancelled</option>
                <option value="Completed">Completed</option>
                <option value="Paid">Paid</option>
                <option value="Pending">Pending</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="gameids">Game IDs</label>
            <input 
                type="text" 
                id="gameids" 
                placeholder="Enter Game IDs (1980-1983,1995)" 
            >
        </div>
         
    </div>

    <div class="email">

        <div class="email-row">
            <div class="field">
                <label for="emailaddr">Email Report To (Optional)</label>
                <input 
                    type="text" 
                    id="emailaddr" 
                    placeholder="someone@example.com" 
                >
            </div>            
            <div class="field">
                <label for="filename">File Name (Optional)</label>
                <input 
                    type="text" 
                    id="filename" 
                    placeholder="report.pdf" 
                >
            </div>

        </div>
    </div>

    <!-- BUTTON ROW -->
    <div class="button-row">

        <button
            class="btn btn-create"
            onclick="generateReport()">
            Create Report
        </button>

        <button
            class="btn btn-clear"
            onclick="clearFilters()">
            Clear
        </button>

    </div>

    <!-- REPORT OUTPUT -->
    <div class="report-container">

        <div class="report-title">
            Report Output
        </div>

        <div id="reportContainer">
Select report options and click "Create Report".
        </div>

    </div>

</div>

<script>

document.getElementById("logoutBtn").addEventListener("click", async () => {

    try {

        const response = await fetch("/api/logout", {
            method: "POST"
        });

        if (response.ok) {
            window.location.href = "/login";
        } else {
            alert("Logout failed");
        }

    } catch(err) {
        alert("Logout failed");
    }

});

async function generateReport() {

    const type =
        document.getElementById("type").value;

    const association =
        document.getElementById("association").value;

    const email =
        document.getElementById("emailaddr").value.trim();

    const file =
        document.getElementById("filename").value.trim();

    const status =
        document.getElementById("status").value;

   const gameids =
        document.getElementById("gameids").value; 

    const params = new URLSearchParams();

    if (type)
        params.append("type", type);

    if (association)
        params.append("association", association);

    if (email)
        params.append("emailaddr", email);

    if (file)
        params.append("filename", file);

    if (status)
        params.append("status", status);

    if (gameids)
        params.append("gameids", gameids);

    try {

        document.getElementById("reportContainer").textContent =
            "Generating report...";

        const response =
            await fetch(`/api/reports?${params.toString()}`);

        if (!response.ok) {

            throw new Error(
                `HTTP ${response.status}: ${response.statusText}`
            );
        }

        const report =
            await response.text();

        document.getElementById("reportContainer").textContent =
            report;
    }
    catch (err) {

        console.error(err);

        document.getElementById("reportContainer").textContent =
            "Failed to generate report.\n\n" + err.message;
    }
}

function clearFilters() {

    document.getElementById("type").value = "";
    document.getElementById("association").value = "";
    document.getElementById("emailaddr").value = "";
    document.getElementById("filename").value = "";
    document.getElementById("status").value = "";
    document.getElementById("gameids").value = "";

    document.getElementById("reportContainer").textContent =
        'Select report options and click "Create Report".';
}

</script>

</body>
</html>
