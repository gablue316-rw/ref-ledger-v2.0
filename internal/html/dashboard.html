<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Game Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .navbar {
            background-color: #0f172a;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }


        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: #1e293b;
        }

        .navbar a.active {
            background-color: #2563eb;
        }

        .filters {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: end;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-width: 180px;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 11px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .games-table th {
            background-color: #0f172a;
            color: white;
            text-align: left;
            padding: 14px;
        }

        .games-table td {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }

        .games-table tr:hover {
            background-color: #f8fafc;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .pending {
            background-color: #dbeafe;
            color: #1d4ed8;
        }

        .completed {
            background-color: #dcfce7;
            color: #15803d;
        }

        .paid {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group input,
            .filter-group select {
                width: 100%;
            }

            .games-table {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Game Dashboard</h1>
        <p>View and manage your game schedule</p>
    </div>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/reports">Report Generator</a>
        <a href="/games">Games</a>
        <a href="/officials">Officials</a>
        <a href="/payments">Payments</a>
        <a href="/expenses">Expenses</a>
        <a href="/associations">Associations</a>
        <a href="/sites">Sites</a>
    </nav>    

    <div class="filters">
        <div class="filter-group">
            <label for="gameId">Game ID</label>
            <input type="text" id="gameId" placeholder="Enter Game ID">
        </div>

        <div class="filter-group">
            <label for="status">Status</label>
            <select id="status">
                <option value="">All</option>
                <option value="Completed">Completed</option>
                <option value="Pending">Pending</option>
                <option value="Paid">Paid</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="begindate">Begin Date</label>
            <input type="text" id="begindate" placeholder="Enter Date (e.g. m/d/yyyy, today, tomorrow, yesterday, this [week | month], next [week | month], last [week | month] )">
        </div>

        <div class="filter-group">
            <label for="enddate">End Date</label>
            <input type="text" id="enddate" placeholder="Enter Date (e.g. m/d/yyyy)">
        </div>

        <div class="filter-group">
            <label for="association">Association</label>
            <select id="association">
                <option value="">All</option>
                <option value="GOLLC">GOLLC</option>
                <option value="MCBOA">MCBOA</option>
                <option value="MSO">MSO</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="sport">Sport</label>
            <select id="sport">
                <option value="">All</option>
                <option value="Basketball">Basketball</option>
                <option value="Softball">Softball</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="official">Official</label>
            <input type="text" id="official" placeholder="Enter Official's Name">                
        </div>

        <div class="filter-group">
            <label for="site">Site</label>
            <select id="site">
                <option value="">All</option>
                <option value="BETH">Bethesda Park</option>
                <option value="BFDAR">Buford Arena</option>
                <option value="BFDHS">Buford High School</option>
                <option value="BFORD">Buford Park</option>
                <option value="BOGNP">Bogan Park</option>
                <option value="GP">George Pierce</option>
                <option value="PCHTR">Peachtree Ridge Park</option>
                <option value="VICLD">Victor Lord Park</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="level">Level</label>
            <select id="level">
                <option value="">All</option>
                <option value="SP">Slow Pitch</option>
                <option value="PW">Pee Wee</option>
                <option value="Minor">Minor</option>
                <option value="Major">Major</option>
                <option value="Junior">Junior</option>
                <option value="Senior">Senior</option>
                <option value="9th Grade">9th Grade</option>
                <option value="JV">Junior Varsity</option>
                <option value="Varsity">Varsity</option>
            </select>    
        </div>
       
        <button class="btn" onclick="loadGames()">
            Search
        </button>
    
        <button class="btn" onclick="clearFilters()">
            Clear
        </button>        
   
    </div>

    <table class="games-table">
        <thead>
            <tr>
                <th>Game ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Sport</th>
                <th>Site</th>
                <th>Field</th>
                <th>Num of Games</th>
                <th>Level</th>
                <th>Game Fee</th>
                <th>Assoc</th>
                <th>Status</th>
                <th>Officials</th>
            </tr>
        </thead>

        <tbody id="gamesBody">
            <!-- Games loaded here -->
        </tbody>
    </table>

</div>

<script>

    async function loadGames() {

        const gameId = document.getElementById("gameId").value;
        const status = document.getElementById("status").value;
        const begindate = document.getElementById("begindate").value;
        const enddate = document.getElementById("enddate").value;
        const site = document.getElementById("site").value;
        const association = document.getElementById("association").value;
        const level = document.getElementById("level").value;
        const sport = document.getElementById("sport").value;
        const official = document.getElementById("official").value;

        // Build query string
        const params = new URLSearchParams();

        if (gameId) params.append("gameId", gameId);
        if (status) params.append("status", status);
        if (begindate) params.append("begindate", begindate);
        if (enddate) params.append("enddate", enddate);
        if (site) params.append("site",site);
        if (association) params.append("association",association)
        if (level) params.append("level",level)
        if (sport) params.append("sport",sport)
        if (official) params.append("official", official);

        try {

            // Replace with your Go API endpoint
            const response = await fetch(`/api/dashboard?${params.toString()}`);

            console.log("Status:", response.status);
            console.log("Content-Type:", response.headers.get("content-type"));

            if (!response.ok) {
               const text = await response.text();
               console.error("Server returned:", text);
               throw new Error(`HTTP ${response.status}`);
            }
       
            const games = await response.json();

            console.log("Games:", games);   

            const tbody = document.getElementById("gamesBody");

            tbody.innerHTML = "";

            games.forEach(game => {

                let statusClass = "";

                if (game.status === "Completed") {
                    statusClass = "completed";
                }
                else if (game.status === "Pending") {
                    statusClass = "pending";
                }
                else {
                    statusClass = "paid";
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${game.GameId}</td>
                        <td>${game.Date}</td>
                        <td>${game.Time}</td>
                        <td>${game.Sport}</td>
                        <td>${game.Site}</td>
                        <td>${game.Field}</td>
                        <td>${game.NumOfGames}</td>                                                                                                
                        <td>${game.Level}</td>
                        <td>${game.GameFee}</td>       
                        <td>${game.Association}</td>              
                        <td>${game.Status}</td>
                        <td>${game.Officials}</td>                           
                    </tr>
                `;
            });

        }
        catch (err) {
            console.error(err);
            alert("Failed to load games.");
        }
    }

    function clearFilters() {

       document.getElementById("gameId").value = "";
       document.getElementById("status").value = "";
       document.getElementById("begindate").value = "";
       document.getElementById("enddate").value = "";
       document.getElementById("site").value = "";
       document.getElementById("association").value = "";
       document.getElementById("level").value = "";
       document.getElementById("sport").value = "";
       document.getElementById("official").value = "";

       loadGames();
    }

    // Initial page load
    loadGames();

</script>

</body>
</html>
