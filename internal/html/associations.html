<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Associations</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .navbar {
            background-color: #0f172a;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: #1e293b;
        }

        .navbar a.active {
            background-color: #2563eb;
        }

        .form-card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-update {
            background-color: #16a34a;
        }

        .btn-update:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #eab308; /* yellow */
            color: #000;              /* black text for contrast */
        }

        .btn-clear:hover {
            background-color: #ca8a04; /* darker yellow */
        }

        .btn-get{
            background:#2563eb;
        }

        .btn-get:hover{
            background:#1d4ed8;
        }        

        .btn-delete {
            background-color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        .message-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 60px;
        }

        @media (max-width: 768px) {

            .row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Associations</h1>
        <p>Manage your Associations</p>
    </div>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Report Generator</a>
        <a href="/games">Games</a>
        <a href="/officials">Officials</a>
        <a href="/payments">Payments</a>
        <a href="/expenses">Expenses</a>
        <a href="/associations" class="active">Associations</a>
        <a href="/sites">Sites</a>
    </nav>

    <div class="form-card">

        <form id="associationForm">

            <div class="row">

                <div class="col">
                    <label for="assocId">Association ID</label>
                    <input
                        type="text" 
                        id="assocId" 
                        placeholder="Enter Association ID" required
                    >
                </div>

                <div class="col">
                    <label for="assocName">Association Name</label>
                    <input type="text" id="assocName" placeholder="Enter Association Name">
                </div>

                <div class="col">
                    <label for="contactName">Contact Name</label>
                    <input type="text" id="contactName" placeholder="Enter Contact Name">
                </div>

            </div>

            <div class="row">

                <div class="col">
                    <label for="contactNumber">Contact Number</label>
                    <input type="text" id="contactNumber" placeholder="Enter Contact Number">
                </div>
 
                <div class="col">
                    <label for="contactEmail">Contact Email</label>
                    <input type="email" id="contactEmail" placeholder="Enter Contact Email">
                </div>

                <div class="col">
                    <label for="assignors">Assignors</label>
                    <input type="text" id="assignors" placeholder="Enter Assignors (comma-separated)">
                </div>

            </div>

            <div class="button-row">

                <button
                    type="button"
                    id="getAssocBtn"
                    class="btn btn-get">
                    Get Association
                </button>
                
                <button
                    type="submit"
                    class="btn btn-update">
                    Update Association
                </button>

                <button
                    type="button"
                    id="clearAssocBtn"
                    class="btn btn-clear">
                    Clear Association
                </button>                
                
                <button
                   type="button"
                   id="deleteBtn"
                   class="btn btn-delete">
                   Delete Association
                </button>

            </div>

        </form>

    </div>

    <div class="message-box" id="message">
        Ready to enter Associations
    </div>

</div>

<script>


document.getElementById("clearAssocBtn").addEventListener("click", function () {
    document.getElementById("associationForm").reset();
    document.getElementById("message").innerText = "";
});


document.getElementById("getAssocBtn").addEventListener("click", async function () {

    const assocId = document.getElementById("assocId").value;
    
    if (!assocId) {
        document.getElementById("message").innerText =
            "Enter an Association ID first.";
        return;
    }

    try {

        const response = await fetch(`/api/association/${assocId}`);

        if (!response.ok) {
            document.getElementById("message").innerText =
                "Association not found.";
            return;
        }

        const association = await response.json();

        console.log("Returned association:", association);

        document.getElementById("assocId").value = association.Id || "";
        document.getElementById("assocName").value = association.Name || "";
        document.getElementById("contactName").value = association.Contact || "";
        document.getElementById("contactNumber").value = association.Phone || "";
        document.getElementById("contactEmail").value = association.Email || "";
        document.getElementById("assignors").value = association.Assignors || "";

        document.getElementById("message").innerText =
            "Association loaded successfully.";

    } catch (err) {
        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});


document.getElementById("deleteBtn").addEventListener("click", async () => {

    const assocId = document.getElementById("assocId").value;

    try {
        const response = await fetch(`/api/deleteAssociation/${assocId}`, {
            method: "DELETE"
        });

        const message = await response.text();

        document.getElementById("message").innerText =
            response.ok
                ? message || "Association deleted successfully."
                : message || "Error deleting association.";
    
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});

document.getElementById("associationForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const association = {
       id: document.getElementById("assocId").value,
       name: document.getElementById("assocName").value,
       contact: document.getElementById("contactName").value,
       phone: document.getElementById("contactNumber").value,
       email: document.getElementById("contactEmail").value,
       assignors: document.getElementById("assignors").value
    };

    try {
        const response = await fetch("/api/associations", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(association)
        });

        document.getElementById("message").innerText =
            response.ok ? "Association saved successfully." : "Error saving association.";
    } catch(err) {
        document.getElementById("message").innerText = "Server unavailable.";
    }
});


</script>

</body>
</html>
