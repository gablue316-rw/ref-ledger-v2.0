<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref Ledger V2.0 Expense Entry</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .navbar {
            background-color: #0f172a;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: #1e293b;
        }

        .navbar a.active {
            background-color: #2563eb;
        }

        .form-card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 11px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-save {
            background-color: #16a34a;
        }

        .btn-save:hover {
            background-color: #15803d;
        }

        .btn-clear {
            background-color: #dc2626;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .message-box {
            background-color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            min-height: 60px;
        }

        @media (max-width: 768px) {

            .row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ref Ledger V2.0 Expense Entry</h1>
        <p>Record and track your officiating expenses.</p>
    </div>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/games">Games</a>
        <a href="/officials">Officials</a>
        <a href="/payments">Payments</a>
        <a href="/expenses" class="active">Expenses</a>
        <a href="/associations">Associations</a>
        <a href="/sites">Sites</a>
    </nav>

    <div class="form-card">

        <form id="expenseForm">

            <div class="row">

                <div class="col">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="col">
                    <label for="association">Association</label>
                    <select id="association">
                        <option value="">Select Association</option>
                        <option value="GOLLC">GOLLC</option>
                        <option value="MCBOA">MCBOA</option>
                        <option value="MSO">MSO</option>
                    </select>
                </div>

            </div>

            <div class="form-group">
                <label for="expenseType">Expense Type</label>
                <select id="expenseType" required>
                    <option value="">Select Expense Type</option>
                    <option value="Mileage">Mileage</option>
                    <option value="Food">Food</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Camp Fees">Camp Fees</option>
                    <option value="Association Dues">Association Dues</option>
                </select>
            </div>

            <div class="row">

                <div class="col">
                    <label for="amount">Amount / Miles</label>
                    <input
                        type="number"
                        id="amount"
                        step="0.01"
                        required
                    >
                </div>

                <div class="col">
                    <label for="gameId">Game ID</label>
                    <input
                        type="number"
                        id="gameId"
                    >
                </div>

            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea
                    id="description"
                    rows="4">
                </textarea>
            </div>

            <div class="button-row">

                <button
                    type="submit"
                    class="btn btn-save">
                    Save Expense
                </button>

                <button
                    type="reset"
                    class="btn btn-clear">
                    Clear Form
                </button>

            </div>

        </form>

    </div>

    <div class="message-box" id="message">
        Ready to enter expenses.
    </div>

</div>

<script>

document.getElementById("expenseForm")
.addEventListener("submit", async function(e) {

    e.preventDefault();

    const expense = {
        date: document.getElementById("date").value,
        expenseType: document.getElementById("expenseType").value,
        amount: parseFloat(document.getElementById("amount").value),
        description: document.getElementById("description").value,
        association: document.getElementById("association").value,
        gameId: parseInt(document.getElementById("gameId").value) || 0
    };

    try {

        const response = await fetch("/api/expenses", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(expense)
        });

        if (response.ok) {

            document.getElementById("message").innerText =
                "Expense saved successfully.";

            document.getElementById("expenseForm").reset();

        } else {

            document.getElementById("message").innerText =
                "Error saving expense.";
        }

    } catch (err) {

        document.getElementById("message").innerText =
            "Server unavailable.";
    }
});

</script>

</body>
</html>
